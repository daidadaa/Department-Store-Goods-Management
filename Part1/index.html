<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PROG2005 A2 Part 1 - Inventory</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Department Store Goods Management</h1>
      <p>Simple goods manage system made by TypeScript</p>
    </header>

    <section class="stats">
      <div class="stat">Total Goods Number: <span id="totalItems">0</span></div>
      <div class="stat">Total Goods Value: $<span id="totalValue">0.00</span></div>
      <div class="stat">Low or No Inventory: <span id="lowStockCount">0</span></div>
    </section>

    <section id="messageArea" class="message" aria-live="polite"></section>

    <section class="card">
      <h2>Goods Information</h2>
      <div class="form-grid">
        <label>Goods ID *<input id="itemId" type="text" required /></label>
        <label>Goods Name *<input id="itemName" type="text" required /></label>
        <label>Goods Category *<select id="category"></select></label>
        <label>Quantity *<input id="quantity" type="number" min="0" required /></label>
        <label>Price *<input id="price" type="number" min="0" step="0.01" required /></label>
        <label>Supplier Name *<input id="supplier" type="text" required /></label>
        <label>Inventory status *<select id="stockStatus"></select></label>
        <label>Popular *<select id="popular"></select></label>
        <label>Remark<input id="comment" type="text" /></label>
      </div>
      <div class="row">
        <button id="submitBtn">Add Goods</button>
        <button id="updateBtn">Update by Goods Name</button>
        <button id="deleteBtn" class="danger">Delete by Goods Name</button>
        <button id="clearBtn" class="ghost">Clear Input</button>
      </div>
    </section>

    <section class="toolbar card">
      <div class="row">
        <input id="searchInput" type="text" placeholder="Search by goods name" />
        <button id="searchBtn">Search Goods</button>
        <button id="resetSearchBtn" class="ghost">Reset Condition</button>
        <button id="showAllBtn" class="ghost">Show All Goods</button>
        <button id="showPopularBtn" class="ghost">Only Popular Goods</button>
        <button id="batchDeleteBtn" class="danger">Delete Selected Goods</button>
      </div>
    </section>

    <section class="card">
      <h3 id="tableTitle">All Goods List</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAll" /></th>
              <th>ID</th>
              <th>Goods Name</th>
              <th>Category</th>
              <th>Qty</th>
              <th>Price</th>
              <th>Supplier</th>
              <th>Inventory</th>
              <th>Popular</th>
              <th>Remark</th>
              <th>Operation</th>
            </tr>
          </thead>
          <tbody id="inventoryBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="dist/inventory.js"></script>
</body>
</html>
